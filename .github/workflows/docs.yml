name: Documentation
on:
  push:
    branches:
      - master
      - main
  # Allow manual re-deploys from the Actions tab (e.g. after a queue timeout)
  # without needing to push a commit.
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    # Only the newest push matters for a full-site build: cancel superseded
    # builds instead of queueing them, so rapid pushes from multiple people
    # collapse into the latest build.
    concurrency:
      group: "pages-build"
      cancel-in-progress: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - uses: actions/configure-pages@v5
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url || steps.deployment-final.outputs.page_url }}
    # Serialize deployments and let in-progress ones finish instead of
    # cancelling them mid-flight (cancelling a run after it has handed off to
    # the Pages backend leaves an "in progress deployment" that the next run
    # collides with). Superseded *pending* deploys are dropped automatically,
    # so only the latest artifact deploys.
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: false
    timeout-minutes: 40
    # deploy-pages caps its wait at 10 minutes per attempt (values above
    # 600000 ms are clamped with a warning), so resilience against a backed-up
    # Pages queue comes from retrying: three attempts gives up to ~30 minutes
    # of total tolerance.
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      # Brief pause before retrying so a colliding "in progress" deployment
      # from another run has a chance to finish.
      - if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
      - if: steps.deployment-retry.outcome == 'failure'
        run: sleep 60
      - uses: actions/deploy-pages@v4
        id: deployment-final
        if: steps.deployment-retry.outcome == 'failure'
